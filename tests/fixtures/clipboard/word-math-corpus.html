<article data-message-author-role="assistant" data-message-id="clipboard-fixture">
  <h2>Word clipboard compatibility</h2>
  <p>Inline script: <math xmlns="http://www.w3.org/1998/Math/MathML"><msubsup><mi>x</mi><mi>i</mi><mn>2</mn></msubsup></math>.</p>
  <p>Fraction and radical:</p>
  <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
    <mrow><mi>E</mi><mo>=</mo><mfrac><mrow><msup><mi>x</mi><mn>2</mn></msup><mo>+</mo><mn>1</mn></mrow><msqrt><mi>y</mi></msqrt></mfrac></mrow>
  </math>
  <p>Large operator limits:</p>
  <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
    <mrow><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>1</mn></mrow><mi>n</mi></munderover><msub><mi>p</mi><mi>i</mi></msub></mrow>
  </math>
  <p>Integral limits:</p>
  <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
    <mrow><msubsup><mo>∫</mo><mn>0</mn><mn>1</mn></msubsup><msup><mi>x</mi><mn>2</mn></msup><mi>d</mi><mi>x</mi></mrow>
  </math>
  <p>Cases:</p>
  <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
    <mrow><mi>f</mi><mo>(</mo><mi>x</mi><mo>)</mo><mo>=</mo><mo>{</mo><mtable><mtr><mtd><mn>1</mn></mtd><mtd><mrow><mi>x</mi><mo>&gt;</mo><mn>0</mn></mrow></mtd></mtr><mtr><mtd><mn>0</mn></mtd><mtd><mtext>otherwise</mtext></mtd></mtr></mtable></mrow>
  </math>
  <p>Matrix:</p>
  <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
    <mrow><mo>[</mo><mtable><mtr><mtd><mi>a</mi></mtd><mtd><mi>b</mi></mtd></mtr><mtr><mtd><mi>c</mi></mtd><mtd><mi>d</mi></mtd></mtr></mtable><mo>]</mo></mrow>
  </math>
  <p>Accents and prime:</p>
  <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
    <mrow><mover accent="true"><mi>x</mi><mo>^</mo></mover><mo>+</mo><mover accent="true"><mi>y</mi><mo>¯</mo></mover><mo>+</mo><msup><mi>z</mi><mo>′</mo></msup></mrow>
  </math>
  <p>Mixed Chinese and symbols:</p>
  <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
    <mrow><mtext>概率 </mtext><mi>α</mi><mo>≤</mo><mi>β</mi><mo>⇒</mo><mi>γ</mi></mrow>
  </math>
